name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Verify and pack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "v${package_version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}." >&2
            exit 1
          fi
      - run: npm ci --ignore-scripts --no-audit
      - run: npm run check
      - run: npm test
      - name: Pack release
        run: |
          mkdir -p dist
          npm pack --ignore-scripts --pack-destination dist
      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release package
        uses: actions/download-artifact@v5
        with:
          name: release-package
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.tgz --repo "${GITHUB_REPOSITORY}" --verify-tag --generate-notes
